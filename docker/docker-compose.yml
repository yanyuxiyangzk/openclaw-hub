version: '3.9'

services:
  backend:
    build:
      context: /mnt/d/project/aicoding/OpenClawHub
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8008:8008"
    environment:
      - DATABASE_URL=sqlite:///./openclawhub.db
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data
      - ./harness:/app/harness
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_started

  frontend:
    build:
      context: /mnt/d/project/aicoding/OpenClawHub
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
