version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openclawhub}
      POSTGRES_USER: ${POSTGRES_USER:-openclawhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openclawhub_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openclawhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: /home/user/projects/openclawhub
      dockerfile: docker/Dockerfile.prod
    restart: unless-stopped
    ports:
      - "8008:8008"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-openclawhub}:${POSTGRES_PASSWORD:-openclawhub_dev}@db:5432/${POSTGRES_DB:-openclawhub}
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - CORS_ORIGINS=http://localhost:5173,http://localhost:80
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  # Frontend (Nginx)
  frontend:
    build:
      context: /home/user/projects/openclawhub
      dockerfile: docker/Dockerfile.frontend.prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  # Redis Cache
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
